name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Run focused unit and CI tests
        run: python -m pytest tests/unit tests/ci -q --junitxml=unit.xml

      - name: Check JUnit report integrity
        run: python scripts/ci/check_test_report.py unit.xml

      - name: Check Pillow remediation
        run: python scripts/ci/check_pillow.py

  site:
    name: site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build site (warnings are errors)
        run: python -m sphinx -W --keep-going -b html site site/_build/html
