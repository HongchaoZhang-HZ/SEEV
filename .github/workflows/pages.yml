name: Pages

# Build the SEEV project site and deploy it to GitHub Pages. The site is built
# only from ``site/`` and deployed only from the built ``site/_build/html``
# artifact. Building runs with least privilege (read-only contents); only the
# deploy job receives the Pages/OIDC permissions.

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Avoid overlapping deploys; let an in-progress production deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions: {}

jobs:
  site:
    name: site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build site (warnings are errors)
        run: python -m sphinx -W --keep-going -b html site site/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_build/html

  deploy:
    name: deploy
    needs: site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
